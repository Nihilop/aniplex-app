name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (required by Android build tools) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Keystore ─────────────────────────────────────────────────────────────
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── Build APK ────────────────────────────────────────────────────────
      # La version embarquée dans l'APK est dérivée du TAG, pas du pubspec.
      # Sans ça, un tag posé sans bump du pubspec produit un APK qui se
      # déclare avec l'ancienne version → l'updater in-app propose la mise à
      # jour en boucle alors qu'elle est déjà installée (bug v2.0.2 : tag
      # v2.0.2 mais pubspec resté à 2.0.1+12).
      # versionCode = MAJOR*10000 + MINOR*100 + PATCH (monotone avec semver,
      # ex: 2.0.3 → 20003) — requis croissant par Android pour les updates.
      - name: Build release APK
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          BUILD_NUMBER=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          echo "Building $VERSION (versionCode=$BUILD_NUMBER) from tag $GITHUB_REF_NAME"
          flutter build apk --release --build-name="$VERSION" --build-number="$BUILD_NUMBER"

      # ── Copie APK avec nom versionné (lisible) + garde app-release.apk (updater) ──
      - name: Prepare APK assets
        run: |
          VERSION="${GITHUB_REF_NAME}"
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/aniplex-tv-${VERSION}.apk

      # ── Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aniplex TV ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/aniplex-tv-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
