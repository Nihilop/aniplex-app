name: Release APK

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Release

jobs:
  build:
    name: Build & Publish APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java (required by Android build tools) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── Flutter ───────────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── Keystore (optional — sign if secrets are set) ─────────────────────
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.jks
          EOF

      # ── Build APK ────────────────────────────────────────────────────────
      - name: Build release APK
        run: flutter build apk --release --target-platform android-arm64

      # ── Rename APK to include version tag ────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${GITHUB_REF_NAME}"   # e.g. v1.2.0
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/aniplex-tv-${VERSION}.apk

      # ── Create GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Aniplex TV ${{ github.ref_name }}"
          body: |
            ## Aniplex TV ${{ github.ref_name }}

            ### Installation
            1. Sur ta Android TV, active **Sources inconnues** dans les paramètres
            2. Transfère le fichier APK via ADB ou une clé USB
            3. Lance l'APK pour installer

            ```bash
            adb install aniplex-tv-${{ github.ref_name }}.apk
            ```
          files: build/app/outputs/flutter-apk/aniplex-tv-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
