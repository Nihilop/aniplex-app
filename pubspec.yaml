name: aniplex_tv
description: Aniplex Android TV Client
publish_to: 'none'
version: 2.0.0+11

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + cookies persistants
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  path_provider: ^2.1.3

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Persistance locale
  shared_preferences: ^2.3.2

  # UI
  qr_flutter: ^4.1.0

  # Video player (media_kit — meilleur support codec + Windows)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_video: ^1.0.4

  # Utilitaires
  intl: ^0.19.0

  # Infos version + mise à jour OTA
  package_info_plus: ^8.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
